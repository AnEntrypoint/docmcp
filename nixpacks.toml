# Nixpacks configuration for docmcp HTTP Server
# This configuration ensures the app runs properly on Coolify and other Nixpacks-compatible platforms

[phases.setup]
nixPkgs = ['...', 'nodejs']
cmds = ['npm install']

[phases.build]
cmds = []

[phases.start]
cmd = 'node http-server.js --port 3000 --host 0.0.0.0'
ports = ['3000:3000']
dependsOn = ['build']

[variables]
GOOGLE_OAUTH_CLIENT_ID = { type = "string", description = "Google OAuth Client ID", required = true }
GOOGLE_OAUTH_CLIENT_SECRET = { type = "string", description = "Google OAuth Client Secret", required = true }
REDIRECT_URI = { type = "string", description = "OAuth Redirect URI (https://your-domain.com/auth/callback)", required = true }
CORS_ORIGIN = { type = "string", description = "CORS origin (https://your-domain.com)", required = true }